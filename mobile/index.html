<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2EMME Cleaning - Mobile</title>

  <!--
    2EMME Cleaning - Mobile App
    DOVE SI CONFIGURA IL BACKEND:
    Qui sotto, nella costante BACKEND_URL.
  -->

  <script>
    // ============================
    // CONFIGURAZIONE MOBILE APP
    // ============================
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbwnXtCVV8BD_5xiItJqZ1YjKqTZCzqvUds2r_tzNVZeWqIJBRERcZtn2mZJKkgmdMHq/exec";
    const GOOGLE_SHEET_URL = "https://docs.google.com/spreadsheets/d/1chEViDrAke793wJZIILx_NVrnheOgRZSTAE6X0CBTFw/edit";
  </script>

  <style>
    :root { --bg:#f3f4f6; --ink:#111827; --muted:#6b7280; --card:#ffffff; --brand:#111827; --ok:#16a34a; --warn:#f59e0b; --bad:#dc2626; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; background:var(--bg); color:var(--ink); }
    header { position:sticky; top:0; z-index:10; background:var(--brand); color:white; padding:16px; }
    header h1 { margin:0; font-size:20px; }
    header small { color:#d1d5db; }
    main { padding:14px; max-width:720px; margin:0 auto; }
    .card { background:var(--card); border-radius:18px; padding:16px; margin:12px 0; box-shadow:0 8px 20px rgba(0,0,0,.06); }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    button { border:0; border-radius:14px; padding:12px 14px; font-weight:700; background:#111827; color:white; cursor:pointer; }
    button.secondary { background:#e5e7eb; color:#111827; }
    button.ok { background:var(--ok); }
    input, select { width:100%; padding:12px; border:1px solid #d1d5db; border-radius:12px; font-size:16px; }
    label { display:block; font-weight:700; margin:10px 0 6px; }
    .muted { color:var(--muted); }
    .pill { display:inline-block; padding:6px 10px; border-radius:999px; background:#e5e7eb; font-size:12px; font-weight:700; }
    .hidden { display:none; }
    .check-item { border:1px solid #e5e7eb; border-radius:14px; padding:12px; margin:10px 0; }
    .check-item strong { display:block; }
    .flags { margin-top:8px; display:grid; gap:6px; grid-template-columns:1fr; }
    .flags label { font-weight:500; margin:0; display:flex; gap:8px; align-items:center; }
    .flags input { width:auto; }
    .status { white-space:pre-wrap; background:#111827; color:#fff; padding:12px; border-radius:14px; overflow:auto; }
    nav { position:sticky; bottom:0; background:white; border-top:1px solid #e5e7eb; display:grid; grid-template-columns:repeat(4,1fr); gap:6px; padding:8px; }
    nav button { padding:10px 6px; font-size:12px; border-radius:12px; }
  </style>
</head>

<body>
<header>
  <h1>2EMME Cleaning</h1>
  <small>Mobile addetti - backend configurato in alto nel file</small>
</header>

<main>
  <section id="view-home" class="view">
    <div class="card">
      <h2>Connessione</h2>
      <p class="muted">Backend Apps Script:</p>
      <div class="status" id="backendLabel"></div>
      <div class="row">
        <button onclick="ping()">Test ping</button>
        <button class="secondary" onclick="loadMobile()">Carica dati</button>
      </div>
      <p id="pingResult" class="muted"></p>
    </div>

    <div class="card">
      <h2>Operatore</h2>
      <label>Nome addetto</label>
      <select id="operatorSelect">
        <option>Maria Guadalupe Hernández de Alfaro</option>
        <option>Carmen Hernández</option>
        <option>Amministratore</option>
      </select>
    </div>

    <div class="card">
      <h2>Turni</h2>
      <div id="turniList" class="muted">Premi "Carica dati".</div>
    </div>
  </section>

  <section id="view-checklist" class="view hidden">
    <div class="card">
      <h2>Checklist intervento</h2>
      <label>Turno ID</label>
      <input id="turnoId" placeholder="es. TURN-001">
      <label>Alloggio</label>
      <input id="alloggio" placeholder="es. Masotto Terrace View">
      <label>Tipo intervento</label>
      <input id="tipoIntervento" value="Pulizia">
    </div>

    <div class="card">
      <h3>Turno in coppia</h3>
      <label><input type="checkbox" id="teamShift" style="width:auto"> Turno con due persone</label>
      <label>Modalità compilazione</label>
      <select id="executionMode">
        <option>Compilo io</option>
        <option>Effettuata da altro addetto</option>
      </select>
      <label>Checklist compilata da</label>
      <select id="compiledBy">
        <option>Maria Guadalupe Hernández de Alfaro</option>
        <option>Carmen Hernández</option>
      </select>
    </div>

    <div class="card">
      <h3>Obbligatori per chiusura</h3>
      <label><input type="checkbox" id="chkPulizia" style="width:auto"> Checklist pulizia completata</label>
      <label><input type="checkbox" id="chkSicurezza" style="width:auto"> Sicurezza verificata</label>
      <label><input type="checkbox" id="chkScorteStaff" style="width:auto"> Scorte materiali staff verificate</label>
      <label><input type="checkbox" id="chkScorteOspiti" style="width:auto"> Scorte ospiti verificate</label>
      <label><input type="checkbox" id="chkLegionellaPrevista" style="width:auto"> Legionella prevista</label>
      <label><input type="checkbox" id="chkLegionellaCompletata" style="width:auto"> Legionella completata</label>
    </div>

    <div class="card">
      <h3>Voci checklist</h3>
      <div id="checklistItems" class="muted">Carica i dati dalla home.</div>
    </div>

    <div class="card">
      <button class="ok" onclick="saveIntervento()">Chiudi intervento</button>
      <p id="saveResult" class="muted"></p>
    </div>
  </section>

  <section id="view-legionella" class="view hidden">
    <div class="card">
      <h2>Registro Legionella</h2>
      <label>Turno ID</label><input id="legTurnoId">
      <label>Alloggio</label><input id="legAlloggio">
      <label>Ospite</label><input id="legOspite">
      <label>N. prenotazione</label><input id="legPrenotazione">
      <label><input type="checkbox" id="legFlussaggio" style="width:auto"> Flussaggio acqua calda 5 minuti</label>
      <label><input type="checkbox" id="legRompigetto" style="width:auto"> Rompigetto puliti</label>
      <label><input type="checkbox" id="legSoffione" style="width:auto"> Soffione doccia pulito</label>
      <label><input type="checkbox" id="legDecalcificazione" style="width:auto"> Decalcificazione eseguita</label>
      <label><input type="checkbox" id="legDisinfezione" style="width:auto"> Disinfezione clorata eseguita</label>
      <label><input type="checkbox" id="legFinestre" style="width:auto"> Finestre aperte durante flussaggio</label>
      <button onclick="saveLegionella()">Salva registro legionella</button>
      <p id="legResult" class="muted"></p>
    </div>
  </section>

  <section id="view-debug" class="view hidden">
    <div class="card">
      <h2>Debug</h2>
      <button onclick="loadDashboard()">Leggi dashboard</button>
      <pre id="debug" class="status"></pre>
    </div>
  </section>
</main>

<nav>
  <button onclick="show('home')">Home</button>
  <button onclick="show('checklist')">Checklist</button>
  <button onclick="show('legionella')">Legionella</button>
  <button onclick="show('debug')">Debug</button>
</nav>

<script>
  let state = { turni: [], checklistTemplate: [], alloggi: [], addetti: [] };
  document.getElementById("backendLabel").textContent = BACKEND_URL;

  function show(name) {
    document.querySelectorAll(".view").forEach(v => v.classList.add("hidden"));
    document.getElementById("view-" + name).classList.remove("hidden");
  }

  async function apiGet(action) {
    const url = new URL(BACKEND_URL);
    url.searchParams.set("action", action);
    const res = await fetch(url.toString());
    return await res.json();
  }

  async function apiPost(payload) {
    const res = await fetch(BACKEND_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });
    return await res.json();
  }

  async function ping() {
    try {
      const data = await apiGet("ping");
      document.getElementById("pingResult").textContent = JSON.stringify(data, null, 2);
    } catch (err) {
      document.getElementById("pingResult").textContent = "Errore ping: " + err.message;
    }
  }

  async function loadMobile() {
    const data = await apiGet("mobile");
    state = data;
    renderTurni();
    renderChecklist();
  }

  function renderTurni() {
    const box = document.getElementById("turniList");
    if (!state.turni || !state.turni.length) {
      box.textContent = "Nessun turno trovato nel foglio Turni.";
      return;
    }
    box.innerHTML = state.turni.map(t => `
      <div class="check-item">
        <strong>${t.Alloggio || ""}</strong>
        <span class="pill">${t.DataTurno || ""} ${t.OraInizio || ""}</span>
        <p>${t.Ospite || "Ospite non indicato"} - ${t.TipoIntervento || ""}</p>
        <button class="secondary" onclick='selectTurno(${JSON.stringify(t)})'>Usa questo turno</button>
      </div>
    `).join("");
  }

  function selectTurno(t) {
    document.getElementById("turnoId").value = t.TurnoId || "";
    document.getElementById("alloggio").value = t.Alloggio || "";
    document.getElementById("tipoIntervento").value = t.TipoIntervento || "Pulizia";
    document.getElementById("legTurnoId").value = t.TurnoId || "";
    document.getElementById("legAlloggio").value = t.Alloggio || "";
    document.getElementById("legOspite").value = t.Ospite || "";
    document.getElementById("legPrenotazione").value = t.NumeroPrenotazione || "";
    show("checklist");
  }

  function renderChecklist() {
    const box = document.getElementById("checklistItems");
    if (!state.checklistTemplate || !state.checklistTemplate.length) {
      box.textContent = "Checklist non trovata.";
      return;
    }
    box.innerHTML = state.checklistTemplate.map(item => `
      <div class="check-item">
        <strong>${item.Fase} - ${item.Voce}</strong>
        <small class="muted">${item.Descrizione || ""}</small>
        <div class="flags">
          <label><input type="checkbox"> OK</label>
          <label><input type="checkbox"> Segnala problema</label>
          <label><input type="checkbox"> Mancante</label>
          <label><input type="checkbox"> Aperto / sigillo rotto</label>
          <label><input type="checkbox"> Danneggiato</label>
          <label><input type="checkbox"> Foto necessaria</label>
        </div>
      </div>
    `).join("");
  }

  async function saveIntervento() {
    const operatore = document.getElementById("operatorSelect").value;
    const payload = {
      action: "saveIntervento",
      TurnoId: document.getElementById("turnoId").value,
      Alloggio: document.getElementById("alloggio").value,
      TipoIntervento: document.getElementById("tipoIntervento").value,
      Operatore: operatore,
      TeamShift: document.getElementById("teamShift").checked,
      ChecklistExecutionMode: document.getElementById("executionMode").value,
      ChecklistCompiledBy: document.getElementById("compiledBy").value,
      ChecklistConfirmedBy: document.getElementById("executionMode").value === "Effettuata da altro addetto" ? operatore : "",
      ChecklistPuliziaCompletata: document.getElementById("chkPulizia").checked,
      SicurezzaVerificata: document.getElementById("chkSicurezza").checked,
      ScorteStaffVerificate: document.getElementById("chkScorteStaff").checked,
      ScorteOspitiVerificate: document.getElementById("chkScorteOspiti").checked,
      LegionellaPrevista: document.getElementById("chkLegionellaPrevista").checked,
      LegionellaCompletata: document.getElementById("chkLegionellaCompletata").checked
    };
    const data = await apiPost(payload);
    document.getElementById("saveResult").textContent = JSON.stringify(data, null, 2);
  }

  async function saveLegionella() {
    const payload = {
      action: "saveRegistroLegionella",
      TurnoId: document.getElementById("legTurnoId").value,
      Alloggio: document.getElementById("legAlloggio").value,
      Operatore: document.getElementById("operatorSelect").value,
      Ospite: document.getElementById("legOspite").value,
      NumeroPrenotazione: document.getElementById("legPrenotazione").value,
      ProceduraPrevista: true,
      FlussaggioAcquaCalda5Min: document.getElementById("legFlussaggio").checked,
      RompigettoPuliti: document.getElementById("legRompigetto").checked,
      SoffioneDocciaPulito: document.getElementById("legSoffione").checked,
      DecalcificazioneEseguita: document.getElementById("legDecalcificazione").checked,
      DisinfezioneClorataEseguita: document.getElementById("legDisinfezione").checked,
      FinestreAperteDuranteFlussaggio: document.getElementById("legFinestre").checked
    };
    const data = await apiPost(payload);
    document.getElementById("legResult").textContent = JSON.stringify(data, null, 2);
  }

  async function loadDashboard() {
    const data = await apiGet("dashboard");
    document.getElementById("debug").textContent = JSON.stringify(data, null, 2);
  }
</script>
</body>
</html>
