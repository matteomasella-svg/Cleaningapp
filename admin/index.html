<!DOCTYPE html>
<html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>2EMME Cleaning Admin CRUD</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><style>body{background:#f1f5f9}.tab{padding:.8rem 1rem;border-radius:1rem;font-weight:900}.tab.active{background:#0f172a;color:#fff}.card{background:white;border:1px solid #e2e8f0;border-radius:1.5rem;box-shadow:0 10px 30px rgba(15,23,42,.04)}.inp{border:1px solid #cbd5e1;border-radius:.9rem;padding:.65rem .8rem;width:100%;background:white}.btn{border-radius:.9rem;padding:.65rem 1rem;font-weight:900}.mini{font-size:.75rem}.table-wrap{overflow:auto;max-height:55vh}.grid-form{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:.6rem}@media(max-width:900px){.grid-form{grid-template-columns:repeat(1,minmax(0,1fr))}.span{grid-column:span 1!important}}</style></head><body class="text-slate-900">
<header class="bg-slate-950 text-white p-5"><div class="max-w-7xl mx-auto flex items-center justify-between gap-4"><div><h1 class="text-2xl font-black">2EMME Cleaning - Admin CRUD</h1><p class="text-slate-300 text-sm">Notifiche, Inventari, Scorte, Magazzino modificabili</p></div><button onclick="reloadAll()" class="btn bg-sky-500 text-white"><i class="fa-solid fa-rotate mr-1"></i>Aggiorna</button></div></header>
<main class="max-w-7xl mx-auto p-4 space-y-4"><section class="card p-4"><label class="text-xs uppercase font-black text-slate-500">Backend Apps Script URL</label><div class="flex gap-2 mt-2"><input id="backend" class="inp" value="https://script.google.com/macros/s/AKfycbwnXtCVV8BD_5xiItJqZ1YjKqTZCzqvUds2r_tzNVZeWqIJBRERcZtn2mZJKkgmdMHq/exec"><button onclick="saveBackend()" class="btn bg-slate-900 text-white">Salva</button><button onclick="testBackend()" class="btn bg-emerald-600 text-white">Test</button></div><p id="status" class="text-sm mt-2 text-slate-500"></p></section>
<nav class="grid grid-cols-2 md:grid-cols-5 gap-2"><button class="tab active" onclick="show('reminders',this)">Notifiche</button><button class="tab" onclick="show('inventory',this)">Inventario Casa</button><button class="tab" onclick="show('stocks',this)">Scorte Alloggi</button><button class="tab" onclick="show('warehouse',this)">Magazzino</button><button class="tab" onclick="show('reintegri',this)">Reintegri</button></nav>
<section id="view-reminders" class="view card p-4"><h2 class="text-xl font-black mb-3">Notifiche / ReminderAddetti CRUD</h2><form onsubmit="saveReminder(event)" class="grid-form"><input id="rem-id" class="inp span" style="grid-column:span 2" placeholder="ReminderId auto/modifica"><input id="rem-to" class="inp span" style="grid-column:span 3" placeholder="Destinatario: Tutti oppure Maria; Carmen"><input id="rem-apartment" class="inp span" style="grid-column:span 2" placeholder="Alloggio"><select id="rem-priority" class="inp span" style="grid-column:span 1"><option>Normale</option><option>Importante</option><option>Alta</option><option>Urgente</option></select><select id="rem-status" class="inp span" style="grid-column:span 1"><option>Da leggere</option><option>Non letto</option><option>Letto</option><option>Archiviato</option></select><input id="rem-due" type="date" class="inp span" style="grid-column:span 2"><input id="rem-title" class="inp span" style="grid-column:span 4" placeholder="Titolo"><input id="rem-message" class="inp span" style="grid-column:span 6" placeholder="Messaggio"><button class="btn bg-sky-600 text-white span" style="grid-column:span 1">Salva</button><button type="button" onclick="clearReminder()" class="btn bg-white border span" style="grid-column:span 1">Nuovo</button></form><div id="reminders-table" class="table-wrap mt-4"></div></section>
<section id="view-inventory" class="view card p-4 hidden"><h2 class="text-xl font-black mb-3">InventarioCasaAlloggi CRUD</h2><form onsubmit="saveInventory(event)" class="grid-form"><input id="inv-alloggio" class="inp span" style="grid-column:span 2" placeholder="Alloggio"><input id="inv-cat" class="inp span" style="grid-column:span 2" placeholder="Categoria"><input id="inv-art" class="inp span" style="grid-column:span 2" placeholder="Articolo"><input id="inv-std" type="number" step="0.01" class="inp span" style="grid-column:span 1" placeholder="Std"><input id="inv-pres" type="number" step="0.01" class="inp span" style="grid-column:span 1" placeholder="Presente"><input id="inv-unit" class="inp span" style="grid-column:span 1" placeholder="Unità"><input id="inv-stato" class="inp span" style="grid-column:span 1" placeholder="Stato"><input id="inv-note" class="inp span" style="grid-column:span 1" placeholder="Note"><button class="btn bg-sky-600 text-white span" style="grid-column:span 1">Salva</button></form><div id="inventory-table" class="table-wrap mt-4"></div></section>
<section id="view-stocks" class="view card p-4 hidden"><h2 class="text-xl font-black mb-3">ScorteAlloggi CRUD</h2><form onsubmit="saveStock(event)" class="grid-form"><input id="st-alloggio" class="inp span" style="grid-column:span 2" placeholder="Alloggio"><input id="st-tipo" class="inp span" style="grid-column:span 2" placeholder="Tipo scorta"><input id="st-sku" class="inp span" style="grid-column:span 2" placeholder="SKU"><input id="st-art" class="inp span" style="grid-column:span 2" placeholder="Articolo"><input id="st-std" type="number" step="0.01" class="inp span" style="grid-column:span 1" placeholder="Std"><input id="st-pres" type="number" step="0.01" class="inp span" style="grid-column:span 1" placeholder="Presente"><input id="st-unit" class="inp span" style="grid-column:span 1" placeholder="Unità"><button class="btn bg-sky-600 text-white span" style="grid-column:span 1">Salva</button></form><div id="stocks-table" class="table-wrap mt-4"></div></section>
<section id="view-warehouse" class="view card p-4 hidden"><h2 class="text-xl font-black mb-3">MagazzinoBassano CRUD</h2><form onsubmit="saveWarehouse(event)" class="grid-form"><input id="wh-sku" class="inp span" style="grid-column:span 2" placeholder="SKU"><input id="wh-art" class="inp span" style="grid-column:span 3" placeholder="Articolo"><input id="wh-cat" class="inp span" style="grid-column:span 2" placeholder="Categoria"><input id="wh-qty" type="number" step="0.01" class="inp span" style="grid-column:span 1" placeholder="Giacenza"><input id="wh-unit" class="inp span" style="grid-column:span 1" placeholder="Unità"><input id="wh-stato" class="inp span" style="grid-column:span 1" placeholder="Stato"><input id="wh-note" class="inp span" style="grid-column:span 1" placeholder="Note"><button class="btn bg-sky-600 text-white span" style="grid-column:span 1">Salva</button></form><div id="warehouse-table" class="table-wrap mt-4"></div></section>
<section id="view-reintegri" class="view card p-4 hidden"><h2 class="text-xl font-black mb-3">ReintegriMagazzino CRUD</h2><form onsubmit="saveReintegro(event)" class="grid-form"><input id="rei-id" class="inp span" style="grid-column:span 2" placeholder="ReintegroId auto/modifica"><select id="rei-stato" class="inp span" style="grid-column:span 1"><option>Aperto</option><option>In corso</option><option>Chiuso</option><option>Annullato</option></select><select id="rei-prio" class="inp span" style="grid-column:span 1"><option>Alta</option><option>Media</option><option>Bassa</option></select><input id="rei-alloggio" class="inp span" style="grid-column:span 2" placeholder="Alloggio"><input id="rei-sku" class="inp span" style="grid-column:span 1" placeholder="SKU"><input id="rei-art" class="inp span" style="grid-column:span 2" placeholder="Articolo"><input id="rei-qty" type="number" step="0.01" class="inp span" style="grid-column:span 1" placeholder="Qta"><input id="rei-unit" class="inp span" style="grid-column:span 1" placeholder="Unità"><button class="btn bg-sky-600 text-white span" style="grid-column:span 1">Salva</button></form><div id="reintegri-table" class="table-wrap mt-4"></div></section></main>
<script>
let data={reminderAddetti:[],inventarioCasaAlloggi:[],scorteAlloggi:[],magazzinoBassano:[],reintegriMagazzino:[]};
function $(id){return document.getElementById(id)}function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function api(){return $('backend').value.trim()}function saveBackend(){localStorage.setItem('2emme_backend',api());$('status').textContent='URL salvato'}$('backend').value=localStorage.getItem('2emme_backend')||$('backend').value;
async function get(action,params={}){const u=new URL(api());u.searchParams.set('action',action);Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,v));const r=await fetch(u);return await r.json()}async function post(payload){const r=await fetch(api(),{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});return await r.json()}async function testBackend(){const r=await get('ping');$('status').textContent=r.success?'Backend OK '+r.timestamp:'Errore backend'}async function reloadAll(){try{data=await get('adminData');renderAll();$('status').textContent='Dati caricati '+(data.timestamp||'')}catch(e){$('status').textContent='Errore caricamento: '+e.message}}
function show(v,b){document.querySelectorAll('.view').forEach(x=>x.classList.add('hidden'));$('view-'+v).classList.remove('hidden');document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active')}
function table(rows, cols, actions){return `<table class="w-full text-sm"><thead><tr>${cols.map(c=>`<th class="text-left p-2 bg-slate-100 sticky top-0">${c}</th>`).join('')}<th class="p-2 bg-slate-100 sticky top-0">Azioni</th></tr></thead><tbody>${(rows||[]).map((r,i)=>`<tr class="border-b">${cols.map(c=>`<td class="p-2 align-top">${esc(r[c])}</td>`).join('')}<td class="p-2 whitespace-nowrap">${actions(r,i)}</td></tr>`).join('')}</tbody></table>`}
function renderAll(){renderRem();renderInv();renderStock();renderWh();renderRei()}
function renderRem(){const cols=['ReminderId','Destinatario','Alloggio','Titolo','Messaggio','Priorita','Scadenza','Stato'];$('reminders-table').innerHTML=table(data.reminderAddetti||[],cols,r=>`<button class="btn bg-white border mini" onclick='editReminder(${JSON.stringify(r)})'>Modifica</button> <button class="btn bg-amber-50 mini" onclick="statusReminder('${esc(r.ReminderId)}','Archiviato')">Archivia</button> <button class="btn bg-rose-50 text-rose-700 mini" onclick="delReminder('${esc(r.ReminderId)}')">Cancella</button>`)}
function editReminder(r){$('rem-id').value=r.ReminderId||'';$('rem-to').value=r.Destinatario||'';$('rem-apartment').value=r.Alloggio||'';$('rem-priority').value=r.Priorita||'Normale';$('rem-status').value=r.Stato||'Da leggere';$('rem-due').value=String(r.Scadenza||'').slice(0,10);$('rem-title').value=r.Titolo||'';$('rem-message').value=r.Messaggio||''}function clearReminder(){['rem-id','rem-to','rem-apartment','rem-due','rem-title','rem-message'].forEach(id=>$(id).value='');$('rem-priority').value='Normale';$('rem-status').value='Da leggere'}async function saveReminder(e){e.preventDefault();const p={action:$('rem-id').value?'updateReminder':'saveReminder',ReminderId:$('rem-id').value||undefined,Destinatario:$('rem-to').value||'Tutti',Alloggio:$('rem-apartment').value,Titolo:$('rem-title').value,Messaggio:$('rem-message').value,Priorita:$('rem-priority').value,Scadenza:$('rem-due').value,Stato:$('rem-status').value,Autore:'Desktop Admin'};const r=await post(p);$('status').textContent=r.success?'Notifica salvata':'Errore: '+r.error;clearReminder();await reloadAll()}async function delReminder(id){if(!confirm('Cancellare notifica?'))return;await post({action:'deleteReminder',ReminderId:id});await reloadAll()}async function statusReminder(id,s){await post({action:'updateReminder',ReminderId:id,Stato:s});await reloadAll()}
function renderInv(){const cols=['Alloggio','Categoria','Articolo','QuantitaStandard','QuantitaPresente','QuantitaMancante','Unita','Stato','Note'];$('inventory-table').innerHTML=table(data.inventarioCasaAlloggi||[],cols,r=>`<button class="btn bg-white border mini" onclick='editInv(${JSON.stringify(r)})'>Modifica</button> <button class="btn bg-rose-50 text-rose-700 mini" onclick='delInv(${JSON.stringify(r)})'>Cancella</button>`)}function editInv(r){$('inv-alloggio').value=r.Alloggio||'';$('inv-cat').value=r.Categoria||'';$('inv-art').value=r.Articolo||'';$('inv-std').value=r.QuantitaStandard||'';$('inv-pres').value=r.QuantitaPresente||'';$('inv-unit').value=r.Unita||'pz';$('inv-stato').value=r.Stato||'';$('inv-note').value=r.Note||''}async function saveInventory(e){e.preventDefault();const std=+$('inv-std').value||0,pres=+$('inv-pres').value||0;await post({action:'upsertInventoryItem',Alloggio:$('inv-alloggio').value,Categoria:$('inv-cat').value,Articolo:$('inv-art').value,QuantitaStandard:std,QuantitaPresente:pres,QuantitaMancante:Math.max(std-pres,0),Unita:$('inv-unit').value||'pz',Stato:$('inv-stato').value,Note:$('inv-note').value});await reloadAll()}async function delInv(r){if(confirm('Cancellare inventario?')){await post({action:'deleteInventoryItem',Alloggio:r.Alloggio,Articolo:r.Articolo,hardDelete:true});await reloadAll()}}
function renderStock(){const cols=['Alloggio','TipoScorta','SKU','Articolo','QuantitaStandard','Unita','QuantitaPresenteUltimoControllo','QuantitaMancanteUltimoControllo','Stato'];$('stocks-table').innerHTML=table(data.scorteAlloggi||[],cols,r=>`<button class="btn bg-white border mini" onclick='editStock(${JSON.stringify(r)})'>Modifica</button> <button class="btn bg-rose-50 text-rose-700 mini" onclick='delStock(${JSON.stringify(r)})'>Cancella</button>`)}function editStock(r){$('st-alloggio').value=r.Alloggio||'';$('st-tipo').value=r.TipoScorta||'';$('st-sku').value=r.SKU||'';$('st-art').value=r.Articolo||'';$('st-std').value=r.QuantitaStandard||'';$('st-pres').value=r.QuantitaPresenteUltimoControllo||'';$('st-unit').value=r.Unita||'pz'}async function saveStock(e){e.preventDefault();const std=+$('st-std').value||0,pres=+$('st-pres').value||0;await post({action:'upsertApartmentStock',Alloggio:$('st-alloggio').value,TipoScorta:$('st-tipo').value,SKU:$('st-sku').value,Articolo:$('st-art').value,QuantitaStandard:std,QuantitaPresenteUltimoControllo:pres,QuantitaMancanteUltimoControllo:Math.max(std-pres,0),Unita:$('st-unit').value||'pz'});await reloadAll()}async function delStock(r){if(confirm('Cancellare scorta?')){await post({action:'deleteApartmentStock',Alloggio:r.Alloggio,SKU:r.SKU,hardDelete:true});await reloadAll()}}
function renderWh(){const cols=['SKU','Articolo','Categoria','GiacenzaAttuale','Unita','Stato','Note'];$('warehouse-table').innerHTML=table(data.magazzinoBassano||[],cols,r=>`<button class="btn bg-white border mini" onclick='editWh(${JSON.stringify(r)})'>Modifica</button> <button class="btn bg-rose-50 text-rose-700 mini" onclick="delWh('${esc(r.SKU)}')">Cancella</button>`)}function editWh(r){$('wh-sku').value=r.SKU||'';$('wh-art').value=r.Articolo||'';$('wh-cat').value=r.Categoria||'';$('wh-qty').value=r.GiacenzaAttuale||'';$('wh-unit').value=r.Unita||'pz';$('wh-stato').value=r.Stato||'';$('wh-note').value=r.Note||''}async function saveWarehouse(e){e.preventDefault();await post({action:'upsertWarehouseItem',SKU:$('wh-sku').value,Articolo:$('wh-art').value,Categoria:$('wh-cat').value,GiacenzaAttuale:$('wh-qty').value,Unita:$('wh-unit').value||'pz',Stato:$('wh-stato').value,Note:$('wh-note').value});await reloadAll()}async function delWh(sku){if(confirm('Cancellare articolo magazzino?')){await post({action:'deleteWarehouseItem',SKU:sku,hardDelete:true});await reloadAll()}}
function renderRei(){const cols=['ReintegroId','Stato','Priorita','Alloggio','SKU','Articolo','QuantitaMancante','Unita','MessaggioAddetto'];$('reintegri-table').innerHTML=table(data.reintegriMagazzino||[],cols,r=>`<button class="btn bg-white border mini" onclick='editRei(${JSON.stringify(r)})'>Modifica</button> <button class="btn bg-rose-50 text-rose-700 mini" onclick="delRei('${esc(r.ReintegroId)}')">Cancella</button>`)}function editRei(r){$('rei-id').value=r.ReintegroId||'';$('rei-stato').value=r.Stato||'Aperto';$('rei-prio').value=r.Priorita||'Alta';$('rei-alloggio').value=r.Alloggio||'';$('rei-sku').value=r.SKU||'';$('rei-art').value=r.Articolo||'';$('rei-qty').value=r.QuantitaMancante||'';$('rei-unit').value=r.Unita||'pz'}async function saveReintegro(e){e.preventDefault();await post({action:'upsertReintegro',ReintegroId:$('rei-id').value||undefined,Stato:$('rei-stato').value,Priorita:$('rei-prio').value,Alloggio:$('rei-alloggio').value,SKU:$('rei-sku').value,Articolo:$('rei-art').value,QuantitaMancante:$('rei-qty').value,Unita:$('rei-unit').value||'pz'});await reloadAll()}async function delRei(id){if(confirm('Cancellare reintegro?')){await post({action:'deleteReintegro',ReintegroId:id,hardDelete:true});await reloadAll()}}
reloadAll();
</script></body></html>
